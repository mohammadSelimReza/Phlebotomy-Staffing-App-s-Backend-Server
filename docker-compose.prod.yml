version: '3.8'

services:
  web:
    build: .
    command: bash -c "daphne -b 0.0.0.0 -p 8500 _core.asgi:application"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
    ports:
      # Expose port only to localhost so the manual VPS Nginx can proxy to it safely
      - "127.0.0.1:8500:8500"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    restart: always

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: phlebotomy_db
      POSTGRES_USER: phlebotomy_user
      POSTGRES_PASSWORD: phlebotomy_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    restart: always

volumes:
  postgres_data:
  static_volume:
  media_volume:
